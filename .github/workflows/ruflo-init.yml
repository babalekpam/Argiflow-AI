name: Ruflo Auto-Init

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force:
        description: 'Force reinitialize even if already set up'
        required: false
        default: 'false'

jobs:
  ruflo-init:
    name: Initialize Ruflo
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check if Ruflo already initialized
        id: check
        run: |
          if [ -f ".claude/settings.json" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Ruflo already initialized, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Ruflo
        if: steps.check.outputs.skip == 'false'
        run: npm install -g ruflo

      - name: Initialize Ruflo (full config, all agents)
        if: steps.check.outputs.skip == 'false'
        run: ruflo init --full --all-agents --no-global --force
        env:
          CI: true

      - name: Initialize Ruflo memory
        if: steps.check.outputs.skip == 'false'
        run: ruflo memory init || true
        env:
          CI: true

      - name: Commit and push Ruflo config
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/ .claude-flow/ .mcp.json CLAUDE.md .swarm/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Initialize Ruflo: 89 agents, 34 skills, full swarm config"
          git push
